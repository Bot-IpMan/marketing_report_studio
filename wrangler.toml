name = "marketing-report-studio"
main = "worker.js"
compatibility_date = "2026-06-12"

[build]
command = "node scripts/build.mjs"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/api", "/api/*", "/marketing_report_studio_v8_access_folders_fixed"]

# Browser-only deployment: no D1, R2, KV, Access variables, or runtime secrets.
# /api is routed through the Worker only so it can return API_DISABLED.
