name = "marketing-report-studio"
main = "worker.js"
compatibility_date = "2026-06-12"
keep_vars = true

[build]
command = "node scripts/build.mjs"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/api", "/api/*", "/marketing_report_studio_v8_access_folders_fixed"]

# Production DB and REPORTS_BUCKET bindings are managed in the Cloudflare
# dashboard. Do not commit account-specific IDs or placeholder UUIDs here.
